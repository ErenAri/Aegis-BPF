# Parity fixture: deny_port / cgroup_deny_port tuple normalization + de-dup.
# Both parsers must store the SAME parsed (port:proto:dir) tuples in the SAME
# order. Notable cases:
#   * bare "443"      -> default proto=0 (any), dir=2 (both)
#   * "8080::egress"  -> empty proto field keeps proto=0, dir=0
#   * egress/connect  -> both map to dir=0 but are distinct raw text, so de-dup
#                        (which keys on raw text) keeps BOTH -> two identical
#                        tuples, on both sides
#   * "443" repeated  -> de-duped to one
version=6

[deny_port]
443
443:tcp
443:udp
443:any
80:tcp:egress
80:tcp:connect
80:tcp:bind
80:tcp:both
8080::egress
1
65535
443

[cgroup_deny_port]
/x 22
/x 22:tcp
/x 22:tcp:egress
/x 22:tcp:connect
cgid:9 443:udp:both
/y 80::bind
