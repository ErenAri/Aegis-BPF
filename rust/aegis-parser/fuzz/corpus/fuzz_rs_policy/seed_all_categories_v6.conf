# Parity fixture: a maximal, error-free v6 policy that exercises EVERY entry
# category and ALL seven boolean flags (with their cross-field companions so the
# parse stays error-free). Pins full-structured C++<->Rust equivalence over the
# whole stored result, including flag emission order. Used by
# scripts/rust_policy_parity.sh. deny_path and protect_path are kept disjoint so
# the only advisory warning is the IP+CIDR redundancy notice.
version=6

[deny_path]
/etc/shadow
/etc/gshadow

[protect_path]
/usr/bin/protected-app

[deny_inode]
2049:128
0:0

[allow_cgroup]
/sys/fs/cgroup/system.slice
cgid:1000

[deny_ip]
10.0.0.1
2001:db8::1

[deny_cidr]
192.168.0.0/16
fe80::/10

[deny_port]
443:tcp
53:udp:both

[deny_ip_port]
10.0.0.1:443:tcp
[2001:db8::1]:8080

[deny_binary_hash]
sha256:1111111111111111111111111111111111111111111111111111111111111111

[allow_binary_hash]
sha256:2222222222222222222222222222222222222222222222222222222222222222

[trusted_exec_hash]
sha256:3333333333333333333333333333333333333333333333333333333333333333

[scan_paths]
/usr/local/bin

[deny_comm]
xmrig

[cgroup_deny_inode]
/sys/fs/cgroup/x 100:200

[cgroup_deny_ip]
cgid:5 10.1.2.3

[cgroup_deny_port]
/sys/fs/cgroup/y 22:tcp:bind

[protect_connect]
[protect_runtime_deps]
[require_ima_appraisal]
[ima_fail_closed]
[deny_ptrace]
[deny_module_load]
[deny_bpf]
