# Parity fixture: deny_ip_port canonicalization + de-dup. The stored/dedup form
# is the canonical key "<ip>|<port>|<proto>" with the IP normalized by
# inet_ntop (C++) / Ipv6Addr|Ipv4Addr (Rust). Both must converge. Notable cases:
#   * "10.0.0.1:443" == "10.0.0.1:443:any"  (omitted proto == any == 0) -> dedup
#   * "10.0.0.1:443" repeated                -> dedup
#   * bracketed IPv6, with/without proto
#   * non-canonical IPv6 ("2001:db8:0:0:0:0:0:1", uppercase) must canonicalize
#     identically on both sides ("2001:db8::1", lowercased)
version=6

[deny_ip_port]
10.0.0.1:443
10.0.0.1:443:any
10.0.0.1:443:tcp
10.0.0.1:443:udp
192.168.1.1:80
8.8.8.8:53:udp
[::1]:443
[::1]:443:tcp
[2001:db8::1]:8080:udp
[2001:db8:0:0:0:0:0:1]:80
[2001:DB8::2]:80
10.0.0.1:443
