apiVersion: v1
kind: Namespace
metadata:
  name: aegisbpf-demo
---
apiVersion: v1
kind: Pod
metadata:
  name: aegisbpf-demo-workload
  namespace: aegisbpf-demo
  labels:
    app: aegisbpf-demo
spec:
  restartPolicy: Never
  containers:
    - name: workload
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo demo-secret > /tmp/aegisbpf-demo-secret
          chmod 600 /tmp/aegisbpf-demo-secret
          sleep 3600
