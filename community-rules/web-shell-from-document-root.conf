# AegisBPF Community Rule — Web shell execution from document root
#
# Denies exec of binaries placed in common attacker drop locations
# under typical web document roots. Detailed FP / scope notes live
# below the tag block (see "Notes" section after [deny_path]).
#
#@aegis-tags
#@id:         web-shell-from-document-root
#@version:    1
#@mitre:      T1505.003, T1059, T1036
#@tactic:     TA0003, TA0002, TA0005
#@platform:   linux, containers
#@compliance: nist-800-53:SI-7, nist-800-190:5.3, pci-dss-4:6.4.1
#@severity:   high
#@maturity:   experimental
#@reference:  https://attack.mitre.org/techniques/T1505/003/
#@reference:  https://owasp.org/www-community/attacks/Web_Shells
#@author:     AegisBPF community
#@end-tags

# IMPORTANT — this rule is `experimental`:
#   It is highly environment-specific. Many CMS auto-update flows,
#   PHP composer installs, and node_modules postinstall scripts WILL
#   trip this rule. Run in audit mode for at least a week before
#   enabling enforce, and tune the deny_path list to match the
#   actual layout of your web root.
#
# What this rule catches:
#   - Execution of binaries placed under common web document roots
#   - Common attacker drop locations (uploads/, tmp/, cache/)
#
# What this rule does NOT catch:
#   - Interpreted-only web shells (a malicious .php executed by
#     mod_php is not a separate process exec). That class is best
#     handled by file integrity monitoring on the web root and a
#     read-only fs mount where possible.
#   - Web shells that use the same binary as the application
#     (e.g. invoking /usr/bin/python with attacker-controlled args).
#     Use parent-process selectors in the rule engine for that.
#
# False positive risk:
#   - HIGH out of the box. Audit first. Tune to your environment.
#   - Composer / npm postinstall scripts often run binaries from
#     vendor/ or node_modules/. Add cgroup-scoped allow rules for
#     the deployment process and deny only inside the running web
#     server cgroup.

version=2

# ─── Common attacker drop locations under web roots ─────────────────
[deny_path]
# nginx / apache document roots
/var/www/html/uploads
/var/www/html/tmp
/var/www/html/cache
/var/www/html/.shell
/var/www/html/wp-content/uploads/.shell
/var/www/html/wp-content/uploads/tmp
/var/www/html/wp-content/cache/tmp

# Tomcat / JSP container webapps
/var/lib/tomcat/webapps/ROOT/uploads
/var/lib/tomcat/webapps/ROOT/.shell
/opt/tomcat/webapps/ROOT/uploads
/opt/tomcat/webapps/ROOT/.shell

# Common nginx alternative roots
/usr/share/nginx/html/uploads
/usr/share/nginx/html/.shell

# IIS / xampp on Linux containers
/opt/lampp/htdocs/uploads
/opt/lampp/htdocs/.shell
