# AegisBPF Community Rule — Kubelet credential exfiltration protection
#
# A common Kubernetes container-escape post-step is to read the kubelet
# client certificate, kubeconfig, or service account tokens off the
# host filesystem and use them to enumerate or pivot inside the
# cluster. This rule denies file opens on those locations so that
# even an escaped container with a host filesystem mount cannot
# scrape the credentials.
#
# What this rule catches:
#   - Reads of /etc/kubernetes/kubelet.conf
#   - Reads of /var/lib/kubelet/pki/* (kubelet TLS material)
#   - Reads of admin.conf, controller-manager.conf, scheduler.conf
#   - Reads of /var/lib/kubelet/pods/*/volumes/kubernetes.io~projected/*/token
#     (the projected service-account token paths, when not used by
#     legitimate kubelet itself)
#
# What this rule does NOT catch:
#   - The kubelet itself reading its own credentials (the kubelet
#     binary is allow-listed via cgroup; it runs in the system
#     kubelet cgroup which should be excluded from this policy via
#     allow_cgroup or by deploying this rule with workloadSelector
#     scoped to non-system pods).
#   - Read of in-pod /var/run/secrets/kubernetes.io/serviceaccount/
#     -- that's the legitimate path the kubelet projects into each
#     pod and is not in scope for this rule.
#
# False positive risk:
#   - Low if deployed with a workloadSelector that excludes the
#     kube-system namespace and the kubelet's own cgroup.
#   - High if applied without scoping; will block kubelet itself.
#   - Recommended deployment: workloadSelector matching all
#     namespaces EXCEPT kube-system, kube-public, kube-node-lease.
#
# References:
#   - https://attack.mitre.org/techniques/T1552/001/
#   - https://attack.mitre.org/techniques/T1552/005/
#   - https://kubernetes.io/docs/setup/best-practices/certificates/
#
#@aegis-tags
#@id:         kubelet-credentials-protection
#@version:    1
#@mitre:      T1552.001, T1552.005, T1550.001
#@tactic:     TA0006, TA0008, TA0005
#@platform:   linux, kubernetes
#@compliance: nist-800-53:AC-3, nist-800-53:SC-12, cis-k8s:4.1.1, cis-k8s:4.1.2
#@severity:   high
#@maturity:   beta
#@reference:  https://attack.mitre.org/techniques/T1552/001/
#@reference:  https://kubernetes.io/docs/setup/best-practices/certificates/
#@author:     AegisBPF community
#@end-tags

version=2

# ─── Kubelet PKI and admin kubeconfigs ──────────────────────────────
[deny_path]
# Kubelet's own kubeconfig and TLS material
/etc/kubernetes/kubelet.conf
/var/lib/kubelet/pki/kubelet-client-current.pem
/var/lib/kubelet/pki/kubelet-client-2026.pem
/var/lib/kubelet/pki/kubelet.crt
/var/lib/kubelet/pki/kubelet.key
/var/lib/kubelet/config.yaml

# Cluster-admin kubeconfigs (control plane nodes)
/etc/kubernetes/admin.conf
/etc/kubernetes/controller-manager.conf
/etc/kubernetes/scheduler.conf
/etc/kubernetes/super-admin.conf

# etcd PKI (often co-located on control plane)
/etc/kubernetes/pki/etcd/ca.key
/etc/kubernetes/pki/etcd/server.key
/etc/kubernetes/pki/etcd/peer.key

# CA private keys (worst-case material)
/etc/kubernetes/pki/ca.key
/etc/kubernetes/pki/front-proxy-ca.key
/etc/kubernetes/pki/sa.key
