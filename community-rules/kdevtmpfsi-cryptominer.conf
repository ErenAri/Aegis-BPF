# AegisBPF Community Rule — Kinsing / kdevtmpfsi cryptominer family
#
# Blocks the well-documented Kinsing malware loader and its kdevtmpfsi
# XMRig payload, which has been observed for years against
# misconfigured Docker/Redis/SaltStack/Kubernetes deployments. The
# Kinsing dropper writes XMRig under recognizable names (kdevtmpfsi,
# kinsing, kdevtmpfsi-test) into world-writable directories and
# launches it from there.
#
# What this rule catches:
#   - Execution of files at the well-known Kinsing payload paths
#   - File opens on the common drop locations under /tmp, /var/tmp,
#     and /dev/shm
#
# What this rule does NOT catch:
#   - Renamed Kinsing variants that drop under a different name --
#     supplement with the generic cryptocurrency-mining-detection
#     rule (examples/policies/cryptocurrency-mining-detection.conf).
#   - The initial Redis / Docker exploit step. AegisBPF blocks the
#     post-exploit payload; perimeter hardening is required for the
#     intrusion vector itself.
#
# False positive risk:
#   - Negligible. No legitimate process writes binaries with these
#     names to these paths.
#
# References:
#   - https://www.aquasec.com/blog/threat-alert-kinsing-malware-container-vulnerability/
#   - https://attack.mitre.org/software/S0599/
#   - https://attack.mitre.org/techniques/T1496/
#
#@aegis-tags
#@id:         kdevtmpfsi-cryptominer
#@version:    1
#@mitre:      T1496, T1059.004, T1036.005
#@tactic:     TA0040, TA0002, TA0005
#@platform:   linux, containers
#@compliance: nist-800-53:SI-3, nist-800-190:6.5.1, pci-dss-4:5.3.2
#@severity:   critical
#@maturity:   beta
#@reference:  https://www.aquasec.com/blog/threat-alert-kinsing-malware-container-vulnerability/
#@reference:  https://attack.mitre.org/software/S0599/
#@author:     AegisBPF community
#@end-tags

version=2

# ─── Kinsing dropper + payload paths ────────────────────────────────
[deny_path]
# Kinsing loader (Go binary)
/tmp/kinsing
/var/tmp/kinsing
/dev/shm/kinsing
/etc/kinsing
/root/kinsing

# kdevtmpfsi (renamed XMRig miner)
/tmp/kdevtmpfsi
/tmp/kdevtmpfsi-test
/var/tmp/kdevtmpfsi
/dev/shm/kdevtmpfsi
/etc/kdevtmpfsi

# Kinsing helper scripts dropped by spre.sh / kuben2.sh
/tmp/spre.sh
/tmp/kuben2.sh
/tmp/kuben.sh
/tmp/cron.sh

# Persistence locations Kinsing has been observed using
/etc/cron.d/kinsing
/etc/cron.d/kdevtmpfsi
/var/spool/cron/crontabs/kinsing
