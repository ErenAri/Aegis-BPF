name: Multi-Arch Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request: {}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Cross-compile userspace for arm64 without QEMU (faster than full emulation)
  cross-compile-arm64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect arm64-relevant changes
        id: changes
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "arm64_relevant=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event; running arm64 cross-compile."
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed="$(
            git diff --name-only "$base" "$head" -- \
              Dockerfile \
              CMakeLists.txt \
              src \
              bpf \
              .github/workflows/multi-arch.yml
          )"

          if [[ -n "$changed" ]]; then
            echo "arm64_relevant=true" >> "$GITHUB_OUTPUT"
            echo "arm64-relevant changes detected:"
            echo "$changed"
          else
            echo "arm64_relevant=false" >> "$GITHUB_OUTPUT"
            echo "No arm64-relevant changes; satisfying required check without cross-compile work."
          fi

      - name: Required check no-op
        if: steps.changes.outputs.arm64_relevant != 'true'
        run: |
          echo "No Dockerfile/CMake/src/bpf/multi-arch workflow inputs changed."
          echo "This required job reports success so branch protection does not wait on an untriggered path-filtered check."

      - name: Install arm64 cross-compilation toolchain
        if: steps.changes.outputs.arm64_relevant == 'true'
        run: |
          sudo dpkg --add-architecture arm64

          # On ubuntu-24.04 (noble) the default apt sources use DEB822 format.
          # Restrict existing sources to amd64 and add arm64 from ports.
          if [[ -f /etc/apt/sources.list.d/ubuntu.sources ]]; then
            sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
            sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi

          # Add arm64 sources from ports.ubuntu.com
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            cmake ninja-build pkg-config \
            libbpf-dev:arm64 libelf-dev:arm64 zlib1g-dev:arm64

      - name: Configure for arm64
        if: steps.changes.outputs.arm64_relevant == 'true'
        run: |
          cmake -S . -B build-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DSKIP_BPF_BUILD=ON \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH="/usr/aarch64-linux-gnu;/usr" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_INCLUDE_PATH=/usr/include \
            -DZLIB_LIBRARY=/usr/lib/aarch64-linux-gnu/libz.so \
            -DZLIB_INCLUDE_DIR=/usr/include
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Build for arm64
        if: steps.changes.outputs.arm64_relevant == 'true'
        run: cmake --build build-arm64

      - name: Verify arm64 binary
        if: steps.changes.outputs.arm64_relevant == 'true'
        run: |
          file build-arm64/aegisbpf | grep -q "aarch64" || (echo "ERROR: Binary is not arm64"; exit 1)
          echo "arm64 binary verified"

  # Build multi-arch Docker images using buildx
  docker-multiarch:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    # Only this job pushes images to GHCR.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push multi-arch image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            STATIC_LIBBPF=ON
