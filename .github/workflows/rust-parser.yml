name: Rust Parser

# Builds + tests the Rust oxidation crate (policy parser + signed-bundle decoder
# + BPF-event decoder) and proves each stays behavior-equivalent to its C++
# original via differential parity harnesses (the gates that must be green before
# a production swap).
on:
  pull_request:
    paths:
      - 'rust/aegis-parser/**'
      - 'scripts/rust_policy_parity.sh'
      - 'scripts/rust_bundle_parity.sh'
      - 'scripts/rust_event_parity.sh'
      - 'src/policy_parse.cpp'
      - 'src/network_ops.cpp'
      - 'src/utils.cpp'
      - 'src/crypto.cpp'
      - 'src/events.cpp'
      - 'src/types.hpp'
      - 'src/aegis_parser_ffi.h'
      - 'src/rust_parse_shadow.cpp'
      - 'src/rust_parse_shadow.hpp'
      - 'src/rust_policy_build.cpp'
      - 'src/rust_policy_build.hpp'
      - 'tests/test_rust_ffi_parity.cpp'
      # the C++ side of the parity gates: the `policy canonical`/`bundle-canonical`/
      # `event-canonical` emitters + dispatch
      - 'src/commands_policy.cpp'
      - 'src/cli_policy.cpp'
      - 'tests/fixtures/parity/**'
      - 'tests/fixtures/bundle_parity/**'
      - 'tests/fixtures/event_parity/**'
      - '.github/workflows/rust-parser.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-parser:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Toolchain
        working-directory: rust/aegis-parser
        run: |
          rustup show active-toolchain || rustup default stable
          rustup component add clippy rustfmt

      - name: Format
        working-directory: rust/aegis-parser
        run: cargo fmt --check

      - name: Clippy
        working-directory: rust/aegis-parser
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit + adversarial tests
        working-directory: rust/aegis-parser
        run: cargo test

      - name: Release build
        working-directory: rust/aegis-parser
        run: cargo build --release

      # --- differential parity gate (Rust <-> C++) ---
      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev pkg-config cmake ninja-build libgtest-dev

      - name: Build aegisbpf (host, no BPF object)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DSKIP_BPF_BUILD=ON
          cmake --build build --target aegisbpf

      - name: Differential parity (corpus + 2000 fuzzed policies)
        run: scripts/rust_policy_parity.sh --fuzz 2000

      - name: Differential bundle parity (fixtures + real + 2000 fuzzed bundles)
        run: scripts/rust_bundle_parity.sh --fuzz 2000

      - name: Differential event parity (fixtures + 2000 fuzzed event records)
        run: scripts/rust_event_parity.sh --fuzz 2000

      # In-process FFI parity: link the Rust parser staticlib into a C++ binary
      # (-DENABLE_RUST_PARSER_LINK=ON) and check the C ABI seam agrees with the
      # C++ parser in the same process — stronger evidence than the out-of-process
      # parity above. Validated only here (this runner has cargo); the main build
      # jobs never set the option, so they need no Rust toolchain.
      - name: In-process Rust FFI parity + shadow (link the crate, run the seams)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build-ffi -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON -DSKIP_BPF_BUILD=ON -DENABLE_RUST_PARSER_LINK=ON
          # Build the daemon too: proves the production binary links the Rust
          # staticlib + shadow, not just the test binary.
          cmake --build build-ffi --target aegisbpf aegis_ffi_parity_test
          ./build-ffi/aegis_ffi_parity_test
