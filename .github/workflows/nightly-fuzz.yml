name: Nightly Fuzz

on:
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Per-target fuzz duration in seconds"
        default: "600"
        required: false
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # actions/cache/save needs no extra scope (unique run_id keys, no cache deletion)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev pkg-config cmake ninja-build libgtest-dev

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build-fuzz -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_FUZZING=ON -DBUILD_TESTING=OFF -DSKIP_BPF_BUILD=ON

      - name: Build
        run: cmake --build build-fuzz --target fuzz_policy fuzz_bundle fuzz_network fuzz_path fuzz_event

      # The runtime corpus is a union of (a) checked-in seeds and
      # (b) interesting inputs libFuzzer discovered on previous nightly
      # runs. Restoring from cache lets coverage compound night-over-night
      # rather than starting from zero-byte seeds every run.
      - name: Restore previous corpus
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: runtime-corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-

      - name: Prepare runtime corpus
        run: |
          for target in fuzz_policy fuzz_bundle fuzz_network fuzz_path fuzz_event; do
            mkdir -p "runtime-corpus/${target}"
            # -n: do not overwrite inputs discovered by previous runs
            if [ -d "tests/fuzz/corpus/${target}" ]; then
              cp -an "tests/fuzz/corpus/${target}/." "runtime-corpus/${target}/" 2>/dev/null || true
            fi
            echo "${target}: $(ls "runtime-corpus/${target}" | wc -l) inputs"
          done

      - name: Run fuzzers (nightly deep)
        env:
          MAX_TOTAL_TIME: ${{ inputs.max_total_time || '600' }}
        run: |
          for target in fuzz_policy fuzz_bundle fuzz_network fuzz_path fuzz_event; do
            echo "Fuzzing ${target} for ${MAX_TOTAL_TIME}s"
            if [ "${target}" = "fuzz_event" ]; then
              # fuzz_event decodes events to stdout; redirect to keep logs
              # manageable while still surfacing libFuzzer stderr stats.
              ./build-fuzz/${target} "runtime-corpus/${target}" \
                -max_total_time="${MAX_TOTAL_TIME}" \
                -print_final_stats=1 \
                >/dev/null
            else
              ./build-fuzz/${target} "runtime-corpus/${target}" \
                -max_total_time="${MAX_TOTAL_TIME}" \
                -print_final_stats=1
            fi
          done

      # Save the grown corpus so tomorrow's run starts from here.
      # Key includes run_id so we never overwrite; actions/cache uses LRU
      # eviction if the repo exceeds its 10 GB quota.
      - name: Save corpus cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: runtime-corpus
          key: fuzz-corpus-${{ github.run_id }}

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-fuzz-crashes
          path: |
            crash-*
            build-fuzz/crash-*

  # Continuous fuzzing of the memory-safe Rust decoders (rust/aegis-parser): the
  # "wire the Rust targets into continuous fuzzing" step from docs/MEMORY_SAFETY.md.
  # Separate job (needs a nightly toolchain + libFuzzer via cargo-fuzz); the stable
  # rust-parser.yml merge gate stays stable-only and never builds these targets.
  rust-fuzz:
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # actions/cache/save needs no extra scope (unique run_id keys, no cache deletion)
    defaults:
      run:
        working-directory: rust/aegis-parser
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install nightly toolchain + cargo-fuzz
        run: |
          rustup toolchain install nightly --profile minimal
          cargo install cargo-fuzz --locked

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

      - name: Restore previous Rust corpus
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: rust/aegis-parser/rust-runtime-corpus
          key: rust-fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            rust-fuzz-corpus-

      - name: Prepare runtime corpus
        run: |
          for target in fuzz_rs_policy fuzz_rs_bundle fuzz_rs_event; do
            mkdir -p "rust-runtime-corpus/${target}"
            # -n: keep inputs discovered by previous nightly runs.
            if [ -d "fuzz/corpus/${target}" ]; then
              cp -an "fuzz/corpus/${target}/." "rust-runtime-corpus/${target}/" 2>/dev/null || true
            fi
            echo "${target}: $(ls "rust-runtime-corpus/${target}" | wc -l) inputs"
          done

      - name: Run fuzzers (nightly deep)
        env:
          MAX_TOTAL_TIME: ${{ inputs.max_total_time || '600' }}
        run: |
          for target in fuzz_rs_policy fuzz_rs_bundle fuzz_rs_event; do
            echo "Fuzzing ${target} for ${MAX_TOTAL_TIME}s"
            cargo +nightly fuzz run "${target}" "rust-runtime-corpus/${target}" \
              -- -max_total_time="${MAX_TOTAL_TIME}" -print_final_stats=1
          done

      - name: Save Rust corpus cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: rust/aegis-parser/rust-runtime-corpus
          key: rust-fuzz-corpus-${{ github.run_id }}

      - name: Upload Rust fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-rust-fuzz-crashes
          path: |
            rust/aegis-parser/fuzz/artifacts/**/crash-*
            rust/aegis-parser/fuzz/artifacts/**/oom-*
            rust/aegis-parser/fuzz/artifacts/**/timeout-*
