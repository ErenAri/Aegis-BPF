name: Release Drill

# Schedule disabled 2026-04-26 (audit pass, see docs/CI_WORKFLOW_AUDIT.md
# P1 action #2). Last run (2026-02-06) failed at the apt-get install
# step with "sudo: a password is required" -- the self-hosted
# `bpf-lsm` runner needs passwordless sudo configured for apt-get,
# which is not the case today. Until the runner is reprovisioned (or
# the install step is rewritten to not require sudo), the monthly
# scheduled run is silently failing. Re-enable the cron once the
# runner side is fixed; workflow remains usable via workflow_dispatch.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 1 * *"

jobs:
  release-drill:
    runs-on: [self-hosted, bpf-lsm]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (if apt-get is available)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y clang llvm libbpf-dev libsystemd-dev pkg-config cmake ninja-build rpm python3-jsonschema linux-tools-common linux-tools-$(uname -r) || sudo apt-get install -y clang llvm libbpf-dev libsystemd-dev pkg-config cmake ninja-build rpm python3-jsonschema linux-tools-common
            if ! command -v bpftool >/dev/null 2>&1; then
              sudo apt-get install -y "linux-tools-$(uname -r)" || \
                sudo apt-get install -y linux-tools-generic || \
                sudo apt-get install -y linux-tools-gcp || true
            fi
            if ! command -v bpftool >/dev/null 2>&1; then
              echo "bpftool is required but was not installed" >&2
              exit 1
            fi
          fi

      - name: Verify environment
        run: scripts/verify_env.sh --strict

      - name: Require BPF LSM
        run: grep -qw bpf /sys/kernel/security/lsm

      - name: Run release drill
        run: BUILD_DIR=build-release-drill SKIP_BPF_BUILD=OFF ARTIFACT_DIR=artifacts/release-drill scripts/release_drill.sh

      - name: Upload release drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-drill-artifacts
          path: artifacts/release-drill/
