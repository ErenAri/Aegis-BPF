name: aegis-next prototype

on:
  push:
    branches: [main, develop, 'feat/aegis-next-*']
    paths:
      - 'prototype/aegis-next/**'
      - 'CMakeLists.txt'
  pull_request:
    paths:
      - 'prototype/aegis-next/**'
      - 'CMakeLists.txt'
  workflow_dispatch:

jobs:
  aegis-next-build:
    name: aegis-next (build + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev libsystemd-dev \
            pkg-config cmake ninja-build zlib1g-dev
          sudo apt-get install -y linux-tools-common
          # bpftool: try kernel-tools first, fall back to generic tools.
          # GitHub-hosted Azure runners ship a wrapper /usr/sbin/bpftool that
          # dispatches to a per-kernel binary which is often absent for the
          # exact running kernel.
          sudo apt-get install -y "linux-tools-$(uname -r)" 2>/dev/null || \
            sudo apt-get install -y linux-tools-generic 2>/dev/null || \
            sudo apt-get install -y bpftool 2>/dev/null || true
          if ! bpftool version >/dev/null 2>&1; then
            # Find any real bpftool binary (exclude the wrapper itself).
            REAL=$(find /usr/lib/linux-tools/ /usr/lib/bpf/ \
                        -name bpftool -type f 2>/dev/null | sort -V | tail -1 || true)
            if [[ -z "$REAL" ]]; then
              for d in /usr/lib/linux-*-tools/; do
                [[ -d "$d" ]] || continue
                REAL=$(find "$d" -name bpftool -type f 2>/dev/null | sort -V | tail -1 || true)
                [[ -n "$REAL" ]] && break
              done
            fi
            if [[ -n "$REAL" ]]; then
              sudo cp "$REAL" /usr/sbin/bpftool
            fi
          fi
          # Verify bpftool works. If not, search harder.
          if ! bpftool version >/dev/null 2>&1; then
            echo "::warning::bpftool wrapper broken; deep search..."
            REAL=$(dpkg -L $(dpkg -l | awk '/linux-tools-[0-9]/{print $2}') 2>/dev/null \
                   | grep '/bpftool$' | head -1 || true)
            if [[ -n "$REAL" && -f "$REAL" ]]; then
              echo "Found bpftool via dpkg -L: $REAL"
              sudo cp "$REAL" /usr/sbin/bpftool
            fi
          fi
          if ! bpftool version >/dev/null 2>&1; then
            REAL=$(find /usr -name bpftool -type f -not -path /usr/sbin/bpftool 2>/dev/null | head -1 || true)
            if [[ -n "$REAL" ]]; then
              echo "Found bpftool via find: $REAL"
              sudo cp "$REAL" /usr/sbin/bpftool
            fi
          fi
          bpftool version >/dev/null 2>&1 || {
            echo "Diagnostic info:"
            dpkg -l | grep -E "linux-tools|bpftool" || true
            dpkg -L linux-tools-$(uname -r) 2>/dev/null | head -20 || true
            find /usr -name bpftool 2>/dev/null || true
            echo "::error::bpftool not functional after all fallbacks" >&2
            exit 1
          }

      - name: Check kernel version
        id: kernel
        run: |
          KVER=$(uname -r)
          MAJOR=$(echo "$KVER" | cut -d. -f1)
          MINOR=$(echo "$KVER" | cut -d. -f2)
          echo "version=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
          if [ "$MAJOR" -gt 6 ] || { [ "$MAJOR" -eq 6 ] && [ "$MINOR" -ge 9 ]; }; then
            echo "arena_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "arena_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Kernel ${MAJOR}.${MINOR} < 6.9 — BPF arena not available, building userspace only"
          fi

      - name: Configure (full, kernel >= 6.9)
        if: steps.kernel.outputs.arena_ready == 'true'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DBUILD_AEGIS_NEXT=ON \
            -DSTATIC_LIBBPF=ON \
            -DLIBBPF_VERSION=1.5.0

      - name: Configure (userspace only, kernel < 6.9)
        if: steps.kernel.outputs.arena_ready != 'true'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DBUILD_AEGIS_NEXT=ON \
            -DSTATIC_LIBBPF=ON \
            -DLIBBPF_VERSION=1.5.0

      - name: Build aegis-next
        if: steps.kernel.outputs.arena_ready == 'true'
        run: cmake --build build --target aegisbpf-next aegis_next_test

      - name: Build aegis-next (test lib only)
        if: steps.kernel.outputs.arena_ready != 'true'
        run: cmake --build build --target aegis_next_test 2>/dev/null || echo "::warning::aegis_next_test build skipped (CMake gated on kernel version)"

      - name: Run aegis-next selftests
        run: |
          if [[ -f build/prototype/aegis_next_test ]]; then
            build/prototype/aegis_next_test --gtest_output=xml:build/aegis_next_test.xml
          else
            echo "::warning::aegis_next_test binary not built, skipping"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-next-test-results
          path: build/aegis_next_test.xml
          if-no-files-found: warn
