# Pack: privilege-escalation
# Purpose: Protect sudo/PAM configuration and block known privilege escalation
#          tools that abuse SUID binaries, capabilities, or sudo misconfigurations.
# MITRE ATT&CK: T1548.001 (Setuid and Setgid Permissions),
#               T1548.003 (Sudo and Sudo Caching).
# Reviewed: 2026-05-24
version=1

[protect_path]
# Sudo configuration — modifying sudoers grants passwordless root.
/etc/sudoers
/etc/sudoers.d

# PAM configuration — modifying PAM modules can bypass authentication
# entirely or install credential-harvesting hooks.
/etc/pam.d

# Security limits — attackers may modify to remove resource restrictions.
/etc/security/limits.conf
/etc/security/limits.d

# Polkit rules — can be modified to allow unprivileged users to perform
# privileged operations without authentication.
/etc/polkit-1/rules.d
/etc/polkit-1/localauthority
/usr/share/polkit-1/rules.d

[deny_path]
# LinPEAS — the most popular Linux privilege escalation enumeration script.
/tmp/linpeas.sh
/tmp/linpeas
/dev/shm/linpeas.sh
/dev/shm/linpeas
/var/tmp/linpeas.sh

# Linux Exploit Suggester.
/tmp/les.sh
/tmp/linux-exploit-suggester.sh
/dev/shm/les.sh

# pspy — unprivileged process snooping tool used to find cron-based
# privesc vectors.
/tmp/pspy
/tmp/pspy64
/dev/shm/pspy
/dev/shm/pspy64

# GTFOBins-style exploit payloads commonly dropped to tmp.
/tmp/exploit
/tmp/privesc
/dev/shm/exploit
/dev/shm/privesc
/var/tmp/exploit
