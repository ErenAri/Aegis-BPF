# Pack: runtime-protection
# Purpose: Protect container runtime Unix sockets from unauthorized access.
#          An attacker with access to these sockets can create, start, or
#          exec into privileged containers, effectively escaping to the host.
# MITRE ATT&CK: T1610 (Deploy Container),
#               T1609 (Container Administration Command).
# Reviewed: 2026-05-24
version=4

[protect_path]
# Docker daemon socket — full Docker API access enables privileged
# container creation and host filesystem mounting.
/var/run/docker.sock
/run/docker.sock

# containerd socket — direct containerd access bypasses Docker-level
# security policies.
/var/run/containerd/containerd.sock
/run/containerd/containerd.sock

# CRI-O socket — same risk as containerd for CRI-O-based clusters.
/var/run/crio/crio.sock
/run/crio/crio.sock

# Podman socket (rootful mode).
/var/run/podman/podman.sock
/run/podman/podman.sock

# Docker API over TCP (if configured for local TCP).
/etc/docker/daemon.json

# kubelet configuration — modifying this can change the container
# runtime's behaviour and security settings.
/var/lib/kubelet/config.yaml
/etc/kubernetes/kubelet.conf
