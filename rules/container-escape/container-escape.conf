# Pack: container-escape
# Purpose: Block filesystem paths commonly abused for container breakout,
#          including /proc and /sys interfaces that grant host-level control.
# MITRE ATT&CK: T1611 (Escape to Host), T1610 (Deploy Container).
# Reviewed: 2026-05-24
version=1

[deny_path]
# SysRq trigger — allows rebooting or crashing the host from inside a
# container when /proc is mounted with write access.
/proc/sysrq-trigger

# Direct physical/kernel memory access — reading these leaks host kernel
# memory, writing them allows arbitrary kernel code execution.
/proc/kcore
/proc/kmem
/dev/mem
/dev/kmem

# Mount namespace file — writing or bind-mounting over this can escape
# the container's filesystem isolation.
/proc/self/ns/mnt

# uevent_helper — setting this sysfs knob makes the kernel exec an
# attacker-controlled binary on every device hotplug event.
/sys/kernel/uevent_helper

# release_agent — abused in the classic cgroup escape: write a path here,
# then trigger it by removing a cgroup.
/sys/fs/cgroup/release_agent
/sys/fs/cgroup/*/release_agent

# core_pattern — overwriting this turns every segfault into RCE on the host.
/proc/sys/kernel/core_pattern

# modprobe trigger path — controls which binary the kernel runs on
# unknown-module load events.
/proc/sys/kernel/modprobe
