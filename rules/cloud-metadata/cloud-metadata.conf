# Pack: cloud-metadata
# Purpose: Protect cloud provider credential files and SDK configuration
#          from unauthorized access. The IMDS endpoint (169.254.169.254) is
#          network-based and out of scope for file-level policy; this pack
#          protects the on-disk credential caches that cloud SDKs create.
# MITRE ATT&CK: T1552.005 (Cloud Instance Metadata API),
#               T1552.001 (Credentials in Files).
# Reviewed: 2026-05-24
version=4

[protect_path]
# AWS CLI/SDK credential files.
/root/.aws/credentials
/root/.aws/config

# Azure CLI credential cache.
/root/.azure/accessTokens.json
/root/.azure/azureProfile.json
/root/.azure/msal_token_cache.json

# Google Cloud SDK credentials.
/root/.config/gcloud/credentials.db
/root/.config/gcloud/application_default_credentials.json
/root/.config/gcloud/access_tokens.db

# Docker registry credentials (may contain cloud registry tokens).
/root/.docker/config.json

# Kubernetes config (often contains cloud provider tokens).
/root/.kube/config

# Terraform state files — may contain cloud credentials and secrets
# in plaintext.
/root/.terraform.d/credentials.tfrc.json

# Common service account directories for non-root cloud workloads.
/home/ubuntu/.aws/credentials
/home/ec2-user/.aws/credentials
/home/azure/.azure/accessTokens.json

# Cloud provider agent credential directories.
/etc/boto.cfg
/etc/google-cloud-sdk
