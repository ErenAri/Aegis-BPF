# Pack: reverse-shell
# Purpose: Block execution of common reverse-shell and network relay tools
#          used by attackers for interactive C2 access after initial compromise.
# MITRE ATT&CK: T1059 (Command and Scripting Interpreter),
#               T1071 (Application Layer Protocol).
# Reviewed: 2026-05-24
version=1

[deny_path]
# Netcat variants — the most common reverse-shell one-liner tool.
/usr/bin/nc
/usr/bin/ncat
/usr/bin/netcat
/bin/nc
/bin/netcat
/bin/ncat
/usr/bin/nc.openbsd
/usr/bin/nc.traditional

# Socat — bidirectional relay, often used for encrypted reverse shells
# and port-forwarding pivots.
/usr/bin/socat
/usr/local/bin/socat

# Nmap — used for reconnaissance but also has scripting engine that can
# open reverse shells via nse scripts.
/usr/bin/nmap
/usr/local/bin/nmap

# Cryptcat — netcat with built-in encryption (twofish), popular in CTF
# and real-world post-exploitation.
/usr/bin/cryptcat
/usr/local/bin/cryptcat

# Powercat is Windows-focused but the binary sometimes appears on Linux
# hosts via cross-platform toolkits.
/usr/bin/powercat

# Reverse-shell generators dropped to temp dirs by automated frameworks.
/tmp/shell
/tmp/reverse
/tmp/rev
/dev/shm/shell
/dev/shm/reverse
/var/tmp/shell
