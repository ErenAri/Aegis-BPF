# Pack: cis-k8s-control-plane
# Purpose: Protect Kubernetes control-plane file artefacts per the CIS
#          Kubernetes Benchmark v1.9.0 §1 (Master Node Security
#          Configuration). Apply on hosts running kube-apiserver,
#          controller-manager, scheduler, or etcd.
# CIS Benchmark refs:
#   §1.1.1, §1.1.2  — kube-apiserver pod manifest perms
#   §1.1.3, §1.1.4  — controller-manager pod manifest perms
#   §1.1.5, §1.1.6  — scheduler pod manifest perms
#   §1.1.7, §1.1.8  — etcd pod manifest perms
#   §1.1.11–§1.1.20 — etcd data dir, scheduler.conf, controller-manager.conf,
#                     admin.conf, kubernetes PKI dir
# MITRE ATT&CK: T1611 (Escape to Host),
#               T1613 (Container and Resource Discovery),
#               T1552.001 (Credentials in Files).
# Last-reviewed: 2026-05-09
version=4

# Pod manifests — kubelet reads these on startup; tampering swaps the
# control-plane binaries for attacker-controlled ones.
[protect_path]
/etc/kubernetes/manifests/kube-apiserver.yaml
/etc/kubernetes/manifests/kube-controller-manager.yaml
/etc/kubernetes/manifests/kube-scheduler.yaml
/etc/kubernetes/manifests/etcd.yaml

# Kubeconfig files for control-plane components and cluster admin.
/etc/kubernetes/admin.conf
/etc/kubernetes/super-admin.conf
/etc/kubernetes/scheduler.conf
/etc/kubernetes/controller-manager.conf

# PKI directory — cluster CA, API server cert, etcd peer/client certs.
/etc/kubernetes/pki

# etcd data directory — cluster state. Whoever can write here owns
# the cluster.
/var/lib/etcd

# CNI configuration (CIS §3.1.1 territory) — pod-network plumbing.
/etc/cni/net.d
