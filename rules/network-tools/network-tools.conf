# Pack: network-tools
# Purpose: Block execution of network scanning and reconnaissance tools
#          used for internal network discovery after initial compromise.
# MITRE ATT&CK: T1046 (Network Service Discovery),
#               T1018 (Remote System Discovery).
# Reviewed: 2026-05-24
version=1

[deny_path]
# Nmap — the standard network scanner; used for port scanning, service
# detection, and OS fingerprinting.
/usr/bin/nmap
/usr/local/bin/nmap

# Masscan — high-speed port scanner, often used for rapid internal
# network enumeration.
/usr/bin/masscan
/usr/local/bin/masscan

# Zmap — internet-scale scanner, sometimes repurposed for internal recon.
/usr/bin/zmap
/usr/local/bin/zmap

# ARP scanner — discovers hosts on the local network segment.
/usr/sbin/arp-scan
/usr/local/sbin/arp-scan

# NBTscan — NetBIOS name scanner for Windows host discovery.
/usr/bin/nbtscan
/usr/local/bin/nbtscan

# Enum4linux — SMB/NetBIOS enumeration tool.
/usr/bin/enum4linux
/usr/local/bin/enum4linux

# Hping — TCP/IP packet assembler/analyzer with scanning capabilities.
/usr/sbin/hping3
/usr/bin/hping3

# Netdiscover — ARP reconnaissance tool.
/usr/sbin/netdiscover
/usr/bin/netdiscover

# Scanners commonly dropped to temp dirs by automated frameworks.
/tmp/nmap
/tmp/masscan
/dev/shm/nmap
/dev/shm/masscan
/var/tmp/nmap
