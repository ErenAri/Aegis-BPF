# Pack: package-manager
# Purpose: Write-protect package manager configuration and state to prevent
#          supply-chain attacks via repository poisoning or package tampering.
# MITRE ATT&CK: T1195.002 (Compromise Software Supply Chain),
#               T1072 (Software Deployment Tools).
# Reviewed: 2026-05-24
version=1

[protect_path]
# APT (Debian/Ubuntu) repository sources.
/etc/apt/sources.list
/etc/apt/sources.list.d
/etc/apt/trusted.gpg
/etc/apt/trusted.gpg.d
/etc/apt/auth.conf.d

# YUM/DNF (RHEL/Fedora/CentOS) repository configuration.
/etc/yum.repos.d
/etc/yum.conf
/etc/dnf/dnf.conf
/etc/dnf/plugins

# RPM database — tampering here can hide installed packages or inject
# fake package records.
/var/lib/rpm

# DPKG status — the authoritative record of installed Debian packages.
/var/lib/dpkg/status
/var/lib/dpkg/available

# Package manager GPG keyrings — adding keys here allows the attacker
# to sign packages from a rogue repository.
/usr/share/keyrings
/etc/pki/rpm-gpg

# Zypper (SUSE) repository configuration.
/etc/zypp/repos.d
