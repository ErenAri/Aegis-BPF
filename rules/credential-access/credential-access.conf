# Pack: credential-access
# Purpose: Block execution of credential dumping and network sniffing tools,
#          and protect credential databases from unauthorized reads.
# MITRE ATT&CK: T1003 (OS Credential Dumping),
#               T1040 (Network Sniffing).
# Reviewed: 2026-05-24
version=1

[deny_path]
# MimiPenguin — Linux equivalent of Mimikatz, extracts cleartext
# credentials from memory.
/usr/bin/mimipenguin
/usr/local/bin/mimipenguin
/opt/mimipenguin/mimipenguin.sh
/tmp/mimipenguin
/dev/shm/mimipenguin

# LaZagne — multi-platform credential recovery tool.
/usr/bin/LaZagne
/usr/bin/lazagne
/usr/local/bin/lazagne
/opt/LaZagne/lazagne
/tmp/lazagne
/dev/shm/lazagne

# Credential dumping utilities commonly abused post-exploitation.
/usr/bin/unshadow
/usr/sbin/unshadow

# Network sniffing tools that can capture credentials on the wire.
/usr/bin/tshark
/usr/local/bin/tshark

[protect_path]
# tcpdump is a legitimate admin tool — protect rather than deny to allow
# reads but block unauthorized writes/replacements.
/usr/sbin/tcpdump
/usr/bin/tcpdump

# Protect the password database from direct reads by non-auth processes.
/etc/shadow
/etc/gshadow
/etc/shadow-
/etc/gshadow-
