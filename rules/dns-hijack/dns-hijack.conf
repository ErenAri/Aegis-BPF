# Pack: dns-hijack
# Purpose: Write-protect DNS and name resolution configuration files to
#          prevent attackers from redirecting DNS queries to malicious
#          resolvers or poisoning local name resolution.
# MITRE ATT&CK: T1584.002 (DNS Server), T1557 (Adversary-in-the-Middle).
# Reviewed: 2026-05-24
version=1

[protect_path]
# Primary DNS resolver configuration — changing nameserver entries here
# redirects all DNS queries to an attacker-controlled resolver.
/etc/resolv.conf

# Static host-to-IP mappings — poisoning this file hijacks specific
# domains without touching DNS at all.
/etc/hosts

# Name service switch configuration — controls the order of name
# resolution sources (files, dns, ldap, etc.).
/etc/nsswitch.conf

# Resolver behaviour configuration.
/etc/host.conf

# systemd-resolved configuration (modern distros).
/etc/systemd/resolved.conf
/etc/systemd/resolved.conf.d

# NetworkManager DNS configuration drop-ins.
/etc/NetworkManager/conf.d

# dnsmasq configuration (commonly used as local resolver/cache).
/etc/dnsmasq.conf
/etc/dnsmasq.d
