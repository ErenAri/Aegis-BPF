# Pack: persistence-shell
# Purpose: Write-protect shell profile and environment files to block
#          persistence via login/shell init script injection.
# MITRE ATT&CK: T1546.004 (Unix Shell Configuration Modification).
# Reviewed: 2026-05-24
version=4

[protect_path]
# Global shell profiles — sourced by every login shell.
/etc/profile
/etc/profile.d
/etc/bash.bashrc
/etc/bashrc

# Global environment variables — sourced by PAM on login.
/etc/environment

# Valid login shells list — adding a shell here can enable login for
# previously-locked service accounts.
/etc/shells

# Root user shell profiles — the highest-value persistence target.
/root/.bashrc
/root/.bash_profile
/root/.profile
/root/.bash_login
/root/.bash_logout

# Zsh equivalents for root.
/root/.zshrc
/root/.zprofile
/root/.zshenv
/root/.zlogin
