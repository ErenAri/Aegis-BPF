# Pack: file-integrity
# Purpose: Write-protect critical system binary directories to prevent
#          binary replacement, PATH hijacking, and trojanization of core
#          OS utilities.
# MITRE ATT&CK: T1036.005 (Match Legitimate Name or Location),
#               T1574 (Hijack Execution Flow).
# Reviewed: 2026-05-24
version=4

[protect_path]
# Core system binary directories — these should only be modified by
# package manager operations, never by application code or interactive
# users during normal operation.
/usr/bin
/usr/sbin
/bin
/sbin

# Local binary directories — used by manually installed software.
/usr/local/bin
/usr/local/sbin

# Library directories — replacing shared libraries is a powerful
# hijack vector (T1574.006 Dynamic Linker Hijacking).
/usr/lib
/usr/lib64
/lib
/lib64
/usr/local/lib
/usr/local/lib64

# Dynamic linker configuration — controls library search paths.
# Poisoning this enables preloading malicious libraries.
/etc/ld.so.conf
/etc/ld.so.conf.d
/etc/ld.so.preload
