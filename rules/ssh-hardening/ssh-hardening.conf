# Pack: ssh-hardening
# Purpose: Protect the SSH server configuration and per-user
#          authorized_keys from tampering by post-exploitation backdoors.
# MITRE ATT&CK: T1098.004 (SSH Authorized Keys),
#               T1556 (Modify Authentication Process),
#               T1543.002 (Systemd Service via dropped sshd unit).
# Last-reviewed: 2026-05-09
version=4

# Read-only protection (writes still observed and blocked, reads
# allowed) for SSH server configuration and the daemon's drop-in dirs.
[protect_path]
/etc/ssh/sshd_config
/etc/ssh/sshd_config.d
/etc/pam.d/sshd
/lib/systemd/system/ssh.service
/lib/systemd/system/sshd.service
/usr/lib/systemd/system/ssh.service
/usr/lib/systemd/system/sshd.service

# authorized_keys for service / system accounts. Add your operator
# accounts to this list (non-root home dirs).
/root/.ssh/authorized_keys
/root/.ssh/authorized_keys2
