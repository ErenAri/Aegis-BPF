# Pack: web-shell
# Purpose: Block execution of well-known web shell binaries and protect
#          common web root directories from unauthorized file creation.
# MITRE ATT&CK: T1505.003 (Web Shell),
#               T1190 (Exploit Public-Facing Application).
# Reviewed: 2026-05-24
version=1

[deny_path]
# Well-known web shell tools dropped to temp directories.
/tmp/c99.php
/tmp/r57.php
/tmp/b374k.php
/tmp/wso.php
/tmp/webshell
/tmp/cmd.php
/tmp/shell.php

# /dev/shm staging — in-memory filesystem used to avoid disk forensics.
/dev/shm/webshell
/dev/shm/shell.php
/dev/shm/cmd.php
/dev/shm/reverse.php
/dev/shm/c99.php

# China Chopper and similar well-known web shell droppers.
/var/tmp/china.php
/var/tmp/webshell
/var/tmp/cmd.php
/var/tmp/tunnel.php

# Weevely — Python-based web shell generator/handler.
/usr/bin/weevely
/usr/local/bin/weevely

[protect_path]
# Standard web root directories — block unauthorized writes to prevent
# web shell upload via application vulnerabilities.
/var/www/html
/var/www
/usr/share/nginx/html
/srv/www

# Common application server deployment directories.
/opt/tomcat/webapps
/var/lib/tomcat/webapps
/var/lib/tomcat9/webapps
