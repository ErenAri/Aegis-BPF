# Pack: kernel-tampering
# Purpose: Disable common kernel-level abuse vectors used by rootkits and
#          post-exploitation toolkits. No false-positives on a typical
#          server workload — these are toggles a hardened production host
#          should already have flipped.
# MITRE ATT&CK: T1547.006 (Kernel Modules and Extensions),
#               T1014 (Rootkit), T1611 (Escape to Host),
#               T1620 (Reflective Code Loading via BPF).
# Last-reviewed: 2026-05-09
version=1

# Block kernel module load / unload via init_module(2) / finit_module(2).
# Set this only on hosts whose final module set is loaded at boot. If you
# load modules dynamically (ZFS, NVIDIA, custom drivers on a developer
# laptop), enable this AFTER the modules you need are already loaded.
[deny_module_load]

# Reject loading of unsigned BPF programs from non-AegisBPF callers.
# Combined with AegisBPF's own self-attestation this caps the kernel's
# attack surface to the agent itself.
[deny_bpf]

# Block ptrace(2) attaches across processes. Defeats common debugger-based
# code injection and credential scrapers. Disable for hosts that run
# strace / gdb / perf-record interactively.
[deny_ptrace]
