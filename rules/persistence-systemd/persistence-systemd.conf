# Pack: persistence-systemd
# Purpose: Write-protect systemd unit files and legacy init scripts to
#          prevent attackers from installing persistent services or
#          modifying boot-time behaviour.
# MITRE ATT&CK: T1543.002 (Systemd Service), T1037 (Boot/Logon Init Scripts).
# Reviewed: 2026-05-24
version=1

[protect_path]
# Admin-managed systemd units — the primary target for persistence.
/etc/systemd/system

# Vendor/package-managed systemd units.
/usr/lib/systemd/system
/lib/systemd/system

# Systemd user units (less common but still a vector).
/etc/systemd/user
/usr/lib/systemd/user

# Legacy SysV init scripts.
/etc/init.d

# rc.local — executed at the end of multi-user boot on systems that
# still support it.
/etc/rc.local

# systemd generator directories — custom generators can inject units
# at boot time.
/etc/systemd/system-generators
/usr/lib/systemd/system-generators
