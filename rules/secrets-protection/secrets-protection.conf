# Pack: secrets-protection
# Purpose: Block read/write access to on-disk credential material used by
#          OS auth, cloud SDKs, and common application secret stores.
# MITRE ATT&CK: T1552.001 (Credentials in Files),
#               T1003.008 (/etc/passwd and /etc/shadow),
#               T1552.004 (Private Keys),
#               T1555 (Credentials from Password Stores).
# Last-reviewed: 2026-05-09
version=1

[deny_path]
# OS authentication databases.
/etc/shadow
/etc/gshadow
/etc/shadow-
/etc/gshadow-
/etc/sudoers

# SSH host keys (non-OpenSSH-server callers should never read these).
/etc/ssh/ssh_host_rsa_key
/etc/ssh/ssh_host_ecdsa_key
/etc/ssh/ssh_host_ed25519_key
/etc/ssh/ssh_host_dsa_key

# Auth audit log — attackers tail this to find lateral targets, and
# tamper to wipe their tracks.
/var/log/auth.log
/var/log/secure
/var/log/wtmp
/var/log/btmp
/var/log/lastlog
/var/log/faillog

# Cloud SDK default credential stores.
/root/.aws/credentials
/root/.aws/config
/root/.azure/azureProfile.json
/root/.config/gcloud/application_default_credentials.json
/root/.docker/config.json
/root/.kube/config

# Service account tokens mounted by Kubernetes.
/var/run/secrets/kubernetes.io/serviceaccount/token
/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

# Kerberos keytabs.
/etc/krb5.keytab
