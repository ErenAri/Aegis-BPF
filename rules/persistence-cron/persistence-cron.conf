# Pack: persistence-cron
# Purpose: Write-protect cron and at scheduler configuration to prevent
#          attackers from installing persistent scheduled tasks.
# MITRE ATT&CK: T1053.003 (Cron), T1053.001 (At).
# Reviewed: 2026-05-24
version=1

[protect_path]
# System-wide crontab.
/etc/crontab

# Drop-in cron directories — packages and admins place per-service
# cron jobs here.
/etc/cron.d
/etc/cron.daily
/etc/cron.hourly
/etc/cron.weekly
/etc/cron.monthly

# Per-user crontab spools — "crontab -e" writes here.
/var/spool/cron
/var/spool/cron/crontabs

# at(1) job spool — less common but still a persistence vector.
/var/spool/at
/var/spool/atjobs

# anacron configuration.
/etc/anacrontab
