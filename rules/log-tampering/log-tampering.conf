# Pack: log-tampering
# Purpose: Write-protect system log files to prevent attackers from deleting
#          or modifying forensic evidence after compromise.
# MITRE ATT&CK: T1070.002 (Clear Linux Logs),
#               T1070.003 (Clear Command History).
# Reviewed: 2026-05-24
version=1

[protect_path]
# Authentication logs — record successful/failed logins, sudo usage,
# and SSH sessions.
/var/log/auth.log
/var/log/secure

# General system logs.
/var/log/syslog
/var/log/messages
/var/log/kern.log
/var/log/daemon.log

# Audit subsystem logs.
/var/log/audit
/var/log/audit/audit.log

# Login accounting databases — last, lastb, who use these.
/var/log/wtmp
/var/log/btmp
/var/log/lastlog
/var/log/faillog

# Systemd journal persistent storage.
/var/log/journal

# Shell command history — attackers wipe or symlink these to /dev/null.
/root/.bash_history
/root/.zsh_history
/root/.sh_history
