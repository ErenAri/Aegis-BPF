# Pack: cryptominers
# Purpose: Block exec of well-known cryptominer binaries at their
#          most common installation paths. Path-based rules only —
#          attackers can rename / move the binary; pair this pack
#          with hash-based rules from your own threat-intel feed
#          for stronger coverage.
# MITRE ATT&CK: T1496 (Resource Hijacking).
# Last-reviewed: 2026-05-09
# Sources:
#   - upstream project install instructions
#     (xmrig: https://xmrig.com/docs/miner/build/),
#   - public sandbox reports (any.run, joe sandbox)
#     of common cryptojacking droppers.
#   - well-known package locations on Linux (`/usr/local/bin/`,
#     `/opt/<project>/`).
version=1

[deny_path]
# XMRig — the most prevalent Linux cryptojacking payload, ~60% of
# observed Linux miner samples (multiple public sandbox reports).
/usr/bin/xmrig
/usr/local/bin/xmrig
/opt/xmrig/xmrig
/root/xmrig
/root/.xmrig/xmrig
/var/tmp/xmrig
/tmp/xmrig
/dev/shm/xmrig

# T-Rex, lolMiner, NBMiner — common GPU miners (XMR alternatives).
/usr/bin/t-rex
/usr/local/bin/t-rex
/opt/t-rex/t-rex
/usr/bin/lolMiner
/usr/local/bin/lolMiner
/usr/bin/nbminer
/usr/local/bin/nbminer

# CCMiner / cgminer / bfgminer — older but still observed.
/usr/bin/ccminer
/usr/local/bin/ccminer
/usr/bin/cgminer
/usr/local/bin/cgminer
/usr/bin/bfgminer
/usr/local/bin/bfgminer

# Ethminer / phoenixminer — Ethereum-era miners, still appear in
# repurposed campaigns.
/usr/bin/ethminer
/usr/local/bin/ethminer
/opt/phoenixminer/PhoenixMiner
/usr/bin/PhoenixMiner

# Common dropper temp paths used by Pacha / WatchDog / Kinsing
# campaigns. These campaigns drop the miner with one of the names
# above into one of these dirs; the path-based block covers the
# handful of names that have stayed consistent across variants.
/tmp/kdevtmpfsi
/tmp/kinsing
/var/tmp/kinsing
/dev/shm/kdevtmpfsi
