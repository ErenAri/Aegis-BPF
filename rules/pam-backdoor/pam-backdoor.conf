# Pack: pam-backdoor
# Purpose: Write-protect PAM (Pluggable Authentication Modules) configuration
#          and module binaries to prevent backdoor insertion into the Linux
#          authentication stack.
# MITRE ATT&CK: T1556.003 (Pluggable Authentication Modules).
# Reviewed: 2026-05-24
version=4

[protect_path]
# PAM service configuration directory — each file controls the auth stack
# for a specific service (sshd, sudo, login, etc.).
/etc/pam.d

# PAM module binaries — replacing or adding a module here allows
# arbitrary code execution during any authentication event.
# Debian/Ubuntu x86_64 path.
/lib/x86_64-linux-gnu/security
# RHEL/CentOS/Fedora 64-bit path.
/lib64/security
# Generic/fallback paths.
/lib/security
/usr/lib/security
/usr/lib64/security
/usr/lib/x86_64-linux-gnu/security

# PAM security configuration — access controls, namespace, group, and
# limits definitions.
/etc/security
/etc/security/access.conf
/etc/security/limits.conf
/etc/security/namespace.conf
/etc/security/pam_env.conf
/etc/security/time.conf

# pam_unix configuration — the core password authentication module reads
# these files.
/etc/login.defs
