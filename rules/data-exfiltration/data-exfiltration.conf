# Pack: data-exfiltration
# Purpose: Block or restrict common data exfiltration tools and protect
#          sensitive data directories from unauthorized access.
#          WARNING: This is an aggressive pack. Blocking curl/wget will
#          break many legitimate workflows. Deploy in audit mode first.
# MITRE ATT&CK: T1048 (Exfiltration Over Alternative Protocol),
#               T1567 (Exfiltration Over Web Service).
# Reviewed: 2026-05-24
version=4

[deny_path]
# Dedicated exfiltration and data transfer tools rarely needed on
# production servers.
/usr/bin/rclone
/usr/local/bin/rclone
/usr/bin/rsync
/usr/local/bin/rsync

# Encoding tools used to prepare data for exfiltration via DNS or HTTP.
/usr/bin/base32
/usr/bin/xxd

# FTP clients — rarely legitimate on modern infrastructure.
/usr/bin/ftp
/usr/bin/sftp
/usr/bin/lftp

# Known exfil tools dropped to staging dirs.
/tmp/exfil
/tmp/upload
/dev/shm/exfil
/dev/shm/upload
/var/tmp/exfil

[protect_path]
# Protect sensitive data directories from reads by unauthorized processes.
/etc/ssl/private
/etc/letsencrypt/live
/etc/letsencrypt/archive

# Database data directories.
/var/lib/mysql
/var/lib/postgresql
/var/lib/mongodb

# Backup directories — high-value exfiltration targets.
/var/backups
