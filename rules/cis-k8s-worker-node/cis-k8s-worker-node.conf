# Pack: cis-k8s-worker-node
# Purpose: Protect Kubernetes worker-node file artefacts per the CIS
#          Kubernetes Benchmark v1.9.0 §4 (Worker Node Security
#          Configuration). Apply on every host running kubelet
#          (control-plane nodes also run kubelet — this pack composes
#          with cis-k8s-control-plane).
# CIS Benchmark refs:
#   §4.1.1, §4.1.2  — kubelet service file
#   §4.1.5, §4.1.6  — kubelet kubeconfig
#   §4.1.7, §4.1.8  — proxy kubeconfig
#   §4.1.9, §4.1.10 — kubelet config.yaml
#   §4.2.6          — protect-kernel-defaults
# MITRE ATT&CK: T1611 (Escape to Host),
#               T1543.002 (Systemd Service),
#               T1552.001 (Credentials in Files).
# Last-reviewed: 2026-05-09
version=4

[protect_path]
# kubelet systemd unit and drop-in dir.
/etc/systemd/system/kubelet.service
/etc/systemd/system/kubelet.service.d
/lib/systemd/system/kubelet.service
/usr/lib/systemd/system/kubelet.service

# kubelet kubeconfig + bootstrap kubeconfig.
/etc/kubernetes/kubelet.conf
/etc/kubernetes/bootstrap-kubelet.conf

# kube-proxy kubeconfig.
/etc/kubernetes/proxy.conf

# kubelet runtime config.
/var/lib/kubelet/config.yaml
/var/lib/kubelet/kubeadm-flags.env

# kubelet client cert — issued by the cluster CA, used to authenticate
# the node to the API server. Steal it and you become the node.
/var/lib/kubelet/pki

# Container runtime socket. Read-only protection so attackers in a
# pod can't pivot through it; the kubelet itself runs out-of-cgroup.
# (For runtimes other than containerd / CRI-O, edit accordingly.)
/run/containerd/containerd.sock
/run/crio/crio.sock
