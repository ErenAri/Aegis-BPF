# Pack: k8s-secrets
# Purpose: Protect Kubernetes secrets, service account tokens, and PKI
#          material on disk from unauthorized access.
# MITRE ATT&CK: T1552.001 (Credentials in Files),
#               T1528 (Steal Application Access Token).
# Reviewed: 2026-05-24
version=1

[protect_path]
# Service account tokens mounted into pods — the primary target for
# Kubernetes API lateral movement.
/var/run/secrets/kubernetes.io
/run/secrets/kubernetes.io

# Kubernetes PKI directory — contains CA certs, API server certs, and
# private keys used for cluster component authentication.
/etc/kubernetes/pki

# kubelet PKI — client certificates for node-to-API-server auth.
/var/lib/kubelet/pki

# kubeconfig files used by cluster components.
/etc/kubernetes/admin.conf
/etc/kubernetes/controller-manager.conf
/etc/kubernetes/scheduler.conf
/etc/kubernetes/kubelet.conf

# etcd data directory — contains all Kubernetes secrets in plaintext
# (unless encryption-at-rest is configured).
/var/lib/etcd

# Kubernetes encryption configuration — contains the encryption keys
# used for secrets encryption-at-rest.
/etc/kubernetes/encryption-config.yaml

# Helm release secrets stored on disk.
/root/.helm
/root/.config/helm
