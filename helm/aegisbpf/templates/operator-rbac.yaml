{{- if .Values.operator.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aegisbpf.fullname" . }}-operator
  labels:
    {{- include "aegisbpf.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aegisbpf.fullname" . }}-operator
  labels:
    {{- include "aegisbpf.labels" . | nindent 4 }}
rules:
  - apiGroups: ["aegisbpf.io"]
    resources: ["aegispolicies", "aegisclusterpolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["aegisbpf.io"]
    resources: ["aegispolicies/status", "aegisclusterpolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["aegisbpf.io"]
    resources: ["aegispolicies/finalizers", "aegisclusterpolicies/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aegisbpf.fullname" . }}-operator
  labels:
    {{- include "aegisbpf.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aegisbpf.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "aegisbpf.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "aegisbpf.fullname" . }}-operator-agent-exec
  namespace: {{ default .Release.Namespace .Values.operator.agentNamespace }}
  labels:
    {{- include "aegisbpf.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "aegisbpf.fullname" . }}-operator-agent-exec
  namespace: {{ default .Release.Namespace .Values.operator.agentNamespace }}
  labels:
    {{- include "aegisbpf.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "aegisbpf.fullname" . }}-operator-agent-exec
subjects:
  - kind: ServiceAccount
    name: {{ include "aegisbpf.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
{{- end }}
