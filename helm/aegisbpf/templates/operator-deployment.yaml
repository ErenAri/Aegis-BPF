{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegisbpf.fullname" . }}-operator
  labels:
    {{- include "aegisbpf.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "aegisbpf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "aegisbpf.labels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aegisbpf.fullname" . }}-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            {{- if .Values.operator.leaderElect }}
            - --leader-elect=true
            {{- end }}
            {{- if .Values.operator.enableIdentityResolution }}
            - --enable-identity-resolution=true
            {{- end }}
            {{- if .Values.operator.webhook.enabled }}
            - --enable-webhook=true
            - --webhook-port={{ .Values.operator.webhook.port }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            {{- if .Values.operator.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.operator.webhook.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if .Values.operator.webhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if .Values.operator.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "aegisbpf.fullname" . }}-webhook-tls
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegisbpf.fullname" . }}-operator
  labels:
    {{- include "aegisbpf.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "aegisbpf.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator
{{- end }}
