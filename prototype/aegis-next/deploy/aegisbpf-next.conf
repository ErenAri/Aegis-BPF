# aegisbpf-next configuration file.
# Pass to the agent with: aegisbpf-next attach --config=/etc/aegisbpf/aegisbpf-next.conf
#
# Lines starting with # are comments. Format: key=value

# Path to the policy rules file (line-based format).
# When deployed via K8s operator, this is auto-mounted from a ConfigMap.
# policy=/etc/aegisbpf/policy.next

# Path for JSONL event export output.
events=/var/log/aegisbpf/events.jsonl

# Use OCSF v1.1 structured output format (true/false).
ocsf=false
